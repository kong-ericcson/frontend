environments:
  development:
    description: Development environment
  test:
    description: Test environment
  production:
    description: Production environment
run-specs:
  default:
    autorun: development
    namespaces:
      main:
        services:
        - web-app
        - api
        - kong
relationships:
- from: kong
  to: api
  type: gateway
  label: Routes traffic to
  blueprint: gateway/kong-proxy
- from: web-app
  to: kong
  type: gateway
  label: Routes API calls through
  blueprint: gateway/kong-proxy